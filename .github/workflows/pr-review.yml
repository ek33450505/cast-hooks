name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the changed files in this PR for cast-hooks. Focus on:
            1. Hook script defensiveness: empty stdin handling, set +e, exit 0 for async hooks
            2. Exit code 2 only for intentional PreToolUse blocking
            3. SQL safety: parameterized queries, IF NOT EXISTS
            4. No hardcoded paths — use $HOME or ~/
            Post findings as a PR comment. Cite file:line for each issue.
