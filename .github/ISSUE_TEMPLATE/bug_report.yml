name: Bug Report
description: Report a bug or unexpected behavior in cast-hooks
labels: [bug]
title: "[Bug] "
body:
  - type: input
    id: version
    attributes:
      label: cast-hooks Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux]
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code Version
      placeholder: "e.g. 1.2.3"
  - type: dropdown
    id: hook
    attributes:
      label: Hook Involved
      options: [cast-session-start, cast-user-prompt, cast-post-tool, cast-tool-failure, cast-instructions, cast-audit, cast-git-guard, cast-headless-guard, cast-session-end, cast-subagent-start, cast-subagent-stop, cast-pre-compact, cast-post-compact, other]
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: hook-output
    attributes:
      label: Hook Output
      description: Paste the raw hook output or relevant log entries
  - type: textarea
    id: context
    attributes:
      label: Additional Context
